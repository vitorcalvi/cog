[pytest]
testpaths = tests
python_paths = src
addopts = -v --tb=short --cov=src/cog_core --cov-report=term-missing --cov-fail-under=90
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning

[coverage:run]
source = src/cog_core
branch = True
omit = 
    */__pycache__/*
    */tests/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise NotImplementedError
    if TYPE_CHECKING:
    @abstractmethod
    if __name__

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "cog-core"
version = "1.0.0"
description = "Semantic code search engine with Nomic embeddings on Apple Silicon MLX"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "MIT" }
authors = [
    { name = "Vitor Calvi", email = "vitor@calvi.ai" }
]
keywords = ["mlx", "embeddings", "semantic-search", "code-intelligence", "apple-silicon"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Python Modules",
]

dependencies = [
    "mlx>=0.30.3",
    "mlx-embedding-models>=0.0.11",
    "sentence-transformers>=5.2.0",
    "tree-sitter>=0.25.2",
    "tree-sitter-language-pack>=1.0.0",
    "lancedb>=0.26.1",
    "networkx>=3.0",
    "matplotlib>=3.7.0",
    "einops>=0.8.1",
    "pyarrow>=18.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-cov>=4.1.0",
    "black>=24.0.0",
    "ruff>=0.6.0",
    "mypy>=1.0.0",
]

[project.scripts]
cog-index = "cog_core.indexer:main"
cog-test = "cog_core.main:test_core"

[tool.hatch.build.targets.wheel]
packages = ["src/cog_core"]

[tool.hatch.build.targets.sdist]
include = ["src/cog_core", "README.md"]

[tool.black]
line-length = 88
target-version = ['py312']

[tool.ruff]
line-length = 88
target-version = "py312"

[tool.mypy]
python_version = "3.12"
warn_return_any = true
warn_unused_configs = true
